services:
  ocr-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    environment:
      - OCR_LANGUAGES=${OCR_LANGUAGES:-eng+fra}
    volumes:
      - /opt/ocr/ocr_data:/mnt/smb

  smb-gateway:
    image: dperson/samba
    container_name: ocr-smb-gateway
    restart: unless-stopped
    volumes:
      - /opt/ocr/ocr_data:/mnt/smb
    ports:
      - "139:139"
      - "445:445"

volumes:
  ocr_data:
